server {
    listen 82;
    server_name _;

    root /home/szz/Documents/progetti/band/frontend/dist;

    # Band API
    location /band/api/ {
        rewrite ^/band(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120;
    }

    # Band assets (hashed filenames → aggressive cache)
    location ~ ^/band/assets/ {
        rewrite ^/band(.*)$ $1 break;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Band SPA — strips /band prefix, SPA fallback
    location /band {
        rewrite ^/band(.*)$ $1 break;
        try_files $uri $uri/ =404;
        error_page 404 =200 /band/index.html;
        add_header Cache-Control "no-cache";
    }

    # Internal fallback target for SPA routes
    location = /band/index.html {
        rewrite ^/band(.*)$ $1 break;
        add_header Cache-Control "no-cache";
    }
}
