<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sfondo -->
  <rect width="512" height="512" rx="80" fill="#1e293b"/>
  <!-- Corpo chitarra -->
  <ellipse cx="200" cy="340" rx="90" ry="75" fill="#f59e0b"/>
  <ellipse cx="200" cy="340" rx="65" ry="53" fill="#d97706"/>
  <!-- Buca della chitarra -->
  <circle cx="200" cy="340" r="28" fill="#1e293b"/>
  <!-- Manico chitarra -->
  <rect x="183" y="130" width="34" height="220" rx="8" fill="#f59e0b"/>
  <!-- Cavigliere -->
  <rect x="173" y="105" width="54" height="40" rx="6" fill="#d97706"/>
  <!-- Corde -->
  <line x1="186" y1="130" x2="186" y2="280" stroke="#fef3c7" stroke-width="2.5"/>
  <line x1="196" y1="130" x2="196" y2="280" stroke="#fef3c7" stroke-width="2.5"/>
  <line x1="206" y1="130" x2="206" y2="280" stroke="#fef3c7" stroke-width="2.5"/>
  <line x1="216" y1="130" x2="216" y2="280" stroke="#fef3c7" stroke-width="2.5"/>
  <!-- Tastino -->
  <rect x="183" y="190" width="34" height="6" rx="2" fill="#fef3c7"/>
  <rect x="183" y="220" width="34" height="6" rx="2" fill="#fef3c7"/>
  <rect x="183" y="250" width="34" height="6" rx="2" fill="#fef3c7"/>
  <!-- Note musicali -->
  <text x="310" y="200" font-size="90" fill="#f59e0b" font-family="serif">♪</text>
  <text x="285" y="290" font-size="60" fill="#fbbf24" font-family="serif" opacity="0.7">♫</text>
</svg>
